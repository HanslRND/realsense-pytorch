services:
  realsense-yolov7:
    build:
      context: .
      dockerfile: Dockerfile.jetson
      args:
        BASE_IMAGE: ${JETSON_BASE_IMAGE:-nvcr.io/nvidia/l4t-pytorch:r36.4.0-pth2.5-py3}
    image: realsense-yolov7-jetson
    network_mode: host
    ipc: host
    privileged: true
    runtime: nvidia
    working_dir: /workspace/realsense-pytorch
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      DISPLAY: ${DISPLAY}
      QT_X11_NO_MITSHM: "1"
      PYTHONPATH: /opt/pyrealsense2:${PYTHONPATH:-}
      LD_LIBRARY_PATH: /opt/pyrealsense2:${LD_LIBRARY_PATH:-}
    volumes:
      - .:/workspace/realsense-pytorch
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
      - ${PYREALSENSE2_DIR:-/home/agv/agv-agent/ros2_ws/librealsense/build/Release}:/opt/pyrealsense2:ro
      - ./.container/cache:/root/.cache
      - ./.container/runs:/workspace/realsense-pytorch/runs
    command: ["python3", "main.py", "--yolov7-dir", ".", "--weights", "models/weight/yolov7.pt", "--device", "0"]
